server.port=8083

spring.application.name=rendezvous-service

spring.datasource.url=jdbc:mariadb://localhost:3306/rendezvous_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# URLs of other microservices
patients.service.url=http://localhost:8081
medecins.service.url=http://localhost:8082
planning.service.url=http://localhost:8086
notifications.service.url=http://localhost:8085

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
