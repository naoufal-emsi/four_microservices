spring.application.name=patient-service
server.port=8081

spring.datasource.url=jdbc:mysql://127.0.0.1:3306/patient_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.generate-ddl=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect

# configuration externe cloud
service.rendezvous.url=http://192.168.1.35:8083/api/rendezvous
service.history.url=http://192.168.1.35:8086/notifications
service.notification.url=http://192.168.1.35:8086/notifications