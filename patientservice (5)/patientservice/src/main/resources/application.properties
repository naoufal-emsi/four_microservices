spring.application.name=patient-service
server.port=8081

spring.datasource.url=jdbc:mysql://127.0.0.1:3306/patient_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.generate-ddl=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect

# configuration externe cloud
service.rendezvous.url=http://localhost:8084/rendezvous
service.history.url=http://localhost:8085/history
service.notification.url=http://localhost:8085/notifications