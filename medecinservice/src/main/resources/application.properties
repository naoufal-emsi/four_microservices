spring.application.name=medecinservice
server.port=8085

spring.datasource.url=jdbc:h2:mem:medecindb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# URLs des autres microservices
service.rendezvous.url=http://localhost:8084/rendezvous
service.planning.url=http://localhost:8083/planning