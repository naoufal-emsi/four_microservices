server.port=8084

spring.application.name=dossiers-service

spring.datasource.url=jdbc:mariadb://localhost:3306/dossiers_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# URLs of other microservices
patients.service.url=http://localhost:8081
rendezvous.service.url=http://localhost:8083
medecins.service.url=http://localhost:8082
notifications.service.url=http://localhost:8085

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
